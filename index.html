<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rent Bidder</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 32px;
      border-bottom: 1px solid #2a2a2a;
      background: #141414;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: #fff;
    }

    .header-stats {
      display: flex;
      gap: 32px;
      align-items: center;
    }

    .stat {
      text-align: right;
    }

    .stat-label {
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-value {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      margin-top: 1px;
    }

    .reset-btn {
      background: none;
      border: 1px solid #333;
      color: #888;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s;
    }

    .reset-btn:hover {
      border-color: #555;
      color: #ccc;
    }

    .main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 24px;
    }

    /* User selector */
    .section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #555;
      margin-bottom: 12px;
      font-weight: 600;
    }

    .user-section {
      margin-bottom: 36px;
    }

    .users-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .user-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid #2a2a2a;
      background: #1a1a1a;
      color: #aaa;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.15s;
      font-family: inherit;
    }

    .user-btn:hover {
      border-color: #444;
      color: #ddd;
    }

    .user-btn.active {
      background: #1a2a1a;
      border-color: #3a7a3a;
      color: #6de06d;
    }

    .user-avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
    }

    .user-name-display {
      cursor: text;
    }

    .user-name-input {
      background: transparent;
      border: none;
      color: inherit;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      width: 80px;
    }

    /* Rooms grid */
    .rooms-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      margin-bottom: 36px;
    }

    .room-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 20px;
      transition: border-color 0.2s;
      position: relative;
      overflow: hidden;
    }

    .room-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: #2a2a2a;
      transition: background 0.3s;
    }

    .room-card.up::before { background: #c0392b; }
    .room-card.down::before { background: #27ae60; }

    .room-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    .room-name {
      font-size: 15px;
      font-weight: 600;
      color: #e0e0e0;
      line-height: 1.3;
    }

    .room-badge {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 3px 8px;
      border-radius: 4px;
      background: #2a2a2a;
      color: #888;
      white-space: nowrap;
      margin-left: 8px;
    }

    .room-badge.double {
      background: #1a2030;
      color: #6699cc;
    }

    .price-section {
      margin-bottom: 14px;
    }

    .price-main {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .price-per-person {
      font-size: 13px;
      color: #666;
      margin-top: 2px;
    }

    .price-delta {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      font-weight: 500;
      margin-top: 6px;
    }

    .price-delta.neutral { color: #555; }
    .price-delta.up { color: #e74c3c; }
    .price-delta.down { color: #2ecc71; }

    .bidders-section {
      min-height: 28px;
      margin-bottom: 14px;
    }

    .bidders-label {
      font-size: 11px;
      color: #444;
      margin-bottom: 6px;
    }

    .bidders-list {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .bidder-chip {
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid #2a2a2a;
      color: #888;
    }

    .bid-count-badge {
      font-size: 10px;
      background: #2a2a2a;
      color: #666;
      padding: 1px 5px;
      border-radius: 3px;
      margin-left: 3px;
    }

    .bid-button {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #222;
      color: #ccc;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    .bid-button:hover:not(:disabled) {
      background: #2a2a2a;
      border-color: #555;
      color: #fff;
    }

    .bid-button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .bid-button.active-user:hover:not(:disabled) {
      background: #1a2a1a;
      border-color: #3a7a3a;
      color: #6de06d;
    }

    /* History */
    .history-section {
      margin-top: 8px;
    }

    .history-empty {
      color: #444;
      font-size: 14px;
      padding: 20px 0;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 1px;
      max-height: 320px;
      overflow-y: auto;
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: #141414;
      border-radius: 6px;
      font-size: 13px;
    }

    .history-item:first-child {
      background: #1a1a1a;
    }

    .history-user {
      font-weight: 600;
      min-width: 80px;
    }

    .history-arrow {
      color: #444;
    }

    .history-room {
      color: #aaa;
      flex: 1;
    }

    .history-delta {
      color: #e74c3c;
      font-weight: 600;
      font-size: 12px;
    }

    .history-time {
      color: #444;
      font-size: 11px;
      min-width: 60px;
      text-align: right;
    }

    /* Totals bar */
    .totals-bar {
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .total-check {
      font-size: 13px;
      color: #555;
    }

    .total-check span {
      color: #2ecc71;
      font-weight: 600;
    }

    @media (max-width: 640px) {
      header { padding: 14px 16px; }
      .main { padding: 20px 16px; }
      .header-stats { gap: 16px; }
      .stat-value { font-size: 14px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useCallback, useEffect, useRef } = React;

    const TOTAL_RENT = 15600;
    const BID_STEP = 25;
    const NUM_ROOMS = 9;

    // 2P + 8*(1.5P) = 15600 → 14P = 15600
    const P = TOTAL_RENT / 14;
    const DOUBLE_PRICE = 2 * P;
    const SINGLE_PRICE = 1.5 * P;

    const ROOM_DEFS = [
      { id: 'double',  name: 'Downstairs Double',        isDouble: true,  initPrice: DOUBLE_PRICE },
      { id: 'first',   name: 'First Floor Room',          isDouble: false, initPrice: SINGLE_PRICE },
      { id: 'sf1',     name: 'Second Floor Room 1',       isDouble: false, initPrice: SINGLE_PRICE },
      { id: 'sf2',     name: 'Second Floor Room 2',       isDouble: false, initPrice: SINGLE_PRICE },
      { id: 'sf3',     name: 'Second Floor Room 3',       isDouble: false, initPrice: SINGLE_PRICE },
      { id: 'sf4',     name: 'Second Floor Room 4',       isDouble: false, initPrice: SINGLE_PRICE },
      { id: 'sfb',     name: 'Second Floor Balcony Room', isDouble: false, initPrice: SINGLE_PRICE },
      { id: 'adu1',    name: 'ADU 1',                     isDouble: false, initPrice: SINGLE_PRICE },
      { id: 'adu2',    name: 'ADU 2',                     isDouble: false, initPrice: SINGLE_PRICE },
    ];

    const USER_COLORS = [
      '#e74c3c','#e67e22','#f1c40f','#2ecc71','#1abc9c',
      '#3498db','#9b59b6','#e91e63','#ff5722','#00bcd4',
    ];

    const DEFAULT_USERS = Array.from({ length: 10 }, (_, i) => `Person ${i + 1}`);

    function fmt(n) {
      return '$' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    }

    function timeSince(ts) {
      const s = Math.floor((Date.now() - ts) / 1000);
      if (s < 60) return `${s}s ago`;
      if (s < 3600) return `${Math.floor(s/60)}m ago`;
      return `${Math.floor(s/3600)}h ago`;
    }

    function loadState() {
      try {
        const s = localStorage.getItem('rentbidder_v2');
        if (s) return JSON.parse(s);
      } catch {}
      return null;
    }

    function saveState(state) {
      try { localStorage.setItem('rentbidder_v2', JSON.stringify(state)); } catch {}
    }

    const initPrices = () => Object.fromEntries(ROOM_DEFS.map(r => [r.id, r.initPrice]));

    function App() {
      const saved = loadState();
      const [prices, setPrices] = useState(() => saved?.prices ?? initPrices());
      const [users, setUsers] = useState(() => saved?.users ?? DEFAULT_USERS);
      const [history, setHistory] = useState(() => saved?.history ?? []);
      const [currentUser, setCurrentUser] = useState(null);
      const [editingUser, setEditingUser] = useState(null);
      const [now, setNow] = useState(Date.now());

      useEffect(() => {
        const id = setInterval(() => setNow(Date.now()), 10000);
        return () => clearInterval(id);
      }, []);

      useEffect(() => {
        saveState({ prices, users, history });
      }, [prices, users, history]);

      const bid = useCallback((roomId) => {
        if (currentUser === null) return;
        const decrease = BID_STEP / (NUM_ROOMS - 1);
        setPrices(prev => {
          const next = { ...prev };
          ROOM_DEFS.forEach(r => {
            next[r.id] = r.id === roomId
              ? prev[r.id] + BID_STEP
              : prev[r.id] - decrease;
          });
          return next;
        });
        setHistory(prev => [
          { user: currentUser, userName: users[currentUser], roomId, ts: Date.now() },
          ...prev,
        ]);
      }, [currentUser, users]);

      const reset = () => {
        if (!confirm('Reset all bids and prices?')) return;
        setPrices(initPrices());
        setHistory([]);
        setCurrentUser(null);
      };

      const updateUserName = (idx, name) => {
        setUsers(prev => {
          const next = [...prev];
          next[idx] = name || `Person ${idx + 1}`;
          return next;
        });
        // update history entries
        setHistory(prev => prev.map(h =>
          h.user === idx ? { ...h, userName: name || `Person ${idx + 1}` } : h
        ));
      };

      const total = ROOM_DEFS.reduce((s, r) => s + prices[r.id], 0);

      // Compute bidder info per room
      const roomBidders = {};
      ROOM_DEFS.forEach(r => { roomBidders[r.id] = {}; });
      history.forEach(h => {
        if (!roomBidders[h.roomId]) roomBidders[h.roomId] = {};
        roomBidders[h.roomId][h.user] = (roomBidders[h.roomId][h.user] || 0) + 1;
      });

      return (
        <div>
          <header>
            <h1>Rent Bidder</h1>
            <div className="header-stats">
              <div className="stat">
                <div className="stat-label">Total Rent</div>
                <div className="stat-value">{fmt(TOTAL_RENT)}</div>
              </div>
              <div className="stat">
                <div className="stat-label">Running Total</div>
                <div className="stat-value" style={{ color: Math.abs(total - TOTAL_RENT) < 0.01 ? '#2ecc71' : '#e74c3c' }}>
                  {fmt(total)}
                </div>
              </div>
              <button className="reset-btn" onClick={reset}>Reset</button>
            </div>
          </header>

          <div className="main">
            {/* User selector */}
            <div className="user-section">
              <div className="section-label">Who are you?</div>
              <div className="users-grid">
                {users.map((name, i) => (
                  <button
                    key={i}
                    className={`user-btn${currentUser === i ? ' active' : ''}`}
                    onClick={() => setCurrentUser(currentUser === i ? null : i)}
                  >
                    <div
                      className="user-avatar"
                      style={{
                        background: currentUser === i ? USER_COLORS[i] + '30' : '#2a2a2a',
                        color: USER_COLORS[i],
                      }}
                    >
                      {name.charAt(0).toUpperCase()}
                    </div>
                    {editingUser === i ? (
                      <input
                        className="user-name-input"
                        defaultValue={name}
                        autoFocus
                        onClick={e => e.stopPropagation()}
                        onBlur={e => { updateUserName(i, e.target.value.trim()); setEditingUser(null); }}
                        onKeyDown={e => { if (e.key === 'Enter' || e.key === 'Escape') e.target.blur(); }}
                      />
                    ) : (
                      <span
                        className="user-name-display"
                        onDoubleClick={e => { e.stopPropagation(); setEditingUser(i); }}
                        title="Double-click to rename"
                      >
                        {name}
                      </span>
                    )}
                  </button>
                ))}
              </div>
              {currentUser === null && (
                <div style={{ marginTop: 10, fontSize: 13, color: '#555' }}>
                  Select yourself above to start bidding · Double-click a name to rename
                </div>
              )}
            </div>

            {/* Rooms */}
            <div className="section-label">Rooms</div>
            <div className="rooms-grid">
              {ROOM_DEFS.map(room => {
                const price = prices[room.id];
                const delta = price - room.initPrice;
                const absDelta = Math.abs(delta);
                const direction = Math.abs(delta) < 0.01 ? 'neutral' : delta > 0 ? 'up' : 'down';
                const bidders = roomBidders[room.id] || {};
                const bidderEntries = Object.entries(bidders);

                return (
                  <div key={room.id} className={`room-card ${direction}`}>
                    <div className="room-card-header">
                      <div className="room-name">{room.name}</div>
                      <div className={`room-badge${room.isDouble ? ' double' : ''}`}>
                        {room.isDouble ? '2 people' : '1 person'}
                      </div>
                    </div>

                    <div className="price-section">
                      <div className="price-main">{fmt(price)}</div>
                      {room.isDouble && (
                        <div className="price-per-person">
                          {fmt(price / 2)} per person
                        </div>
                      )}
                      <div className={`price-delta ${direction}`}>
                        {direction === 'neutral' && <span>Starting price</span>}
                        {direction === 'up' && <span>↑ {fmt(absDelta)} above start</span>}
                        {direction === 'down' && <span>↓ {fmt(absDelta)} below start</span>}
                      </div>
                    </div>

                    <div className="bidders-section">
                      {bidderEntries.length > 0 && (
                        <>
                          <div className="bidders-label">Bids placed</div>
                          <div className="bidders-list">
                            {bidderEntries.map(([userIdx, count]) => (
                              <span
                                key={userIdx}
                                className="bidder-chip"
                                style={{ borderColor: USER_COLORS[+userIdx] + '60', color: USER_COLORS[+userIdx] }}
                              >
                                {users[+userIdx]}
                                {count > 1 && <span className="bid-count-badge">×{count}</span>}
                              </span>
                            ))}
                          </div>
                        </>
                      )}
                    </div>

                    <button
                      className={`bid-button${currentUser !== null ? ' active-user' : ''}`}
                      onClick={() => bid(room.id)}
                      disabled={currentUser === null}
                    >
                      {currentUser === null ? 'Select yourself to bid' : `Bid +$${BID_STEP}`}
                    </button>
                  </div>
                );
              })}
            </div>

            {/* Bid history */}
            <div className="history-section">
              <div className="section-label">Bid History</div>
              {history.length === 0 ? (
                <div className="history-empty">No bids yet.</div>
              ) : (
                <div className="history-list">
                  {history.map((h, i) => {
                    const room = ROOM_DEFS.find(r => r.id === h.roomId);
                    return (
                      <div key={i} className="history-item">
                        <span className="history-user" style={{ color: USER_COLORS[h.user] }}>
                          {h.userName}
                        </span>
                        <span className="history-arrow">→</span>
                        <span className="history-room">{room?.name}</span>
                        <span className="history-delta">+${BID_STEP}</span>
                        <span className="history-time">{timeSince(h.ts)}</span>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
