<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rent Bidder</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
    }

    /* ── Join screen ── */
    .join-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .join-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }
    .join-card h1 { font-size: 28px; font-weight: 700; color: #fff; margin-bottom: 6px; }
    .join-subtitle { color: #555; font-size: 14px; margin-bottom: 28px; line-height: 1.5; }
    .join-input {
      width: 100%;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 16px;
      color: #fff;
      font-family: inherit;
      outline: none;
      margin-bottom: 10px;
      transition: border-color 0.15s;
    }
    .join-input:focus { border-color: #555; }
    .join-btn {
      width: 100%;
      background: #222;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 12px;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .join-btn:hover:not(:disabled) { background: #2a2a2a; border-color: #666; }
    .join-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Loading ── */
    .loading {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      font-size: 15px;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 28px;
      border-bottom: 1px solid #1e1e1e;
      background: #141414;
      position: sticky;
      top: 0;
      z-index: 10;
      gap: 16px;
    }
    header h1 { font-size: 18px; font-weight: 700; color: #fff; white-space: nowrap; }
    .header-right {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .my-identity {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }
    .my-identity:hover { border-color: #444; }
    .identity-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .my-room-tag {
      font-size: 11px;
      color: #666;
      padding: 2px 8px;
      background: #1e1e1e;
      border-radius: 4px;
    }
    .locked-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #c0792b;
      background: #1e1200;
      border: 1px solid #3a2500;
      padding: 5px 12px;
      border-radius: 20px;
    }
    .disconnected-pill {
      font-size: 12px;
      color: #e74c3c;
      background: #2a1010;
      border: 1px solid #5a2020;
      padding: 4px 10px;
      border-radius: 20px;
    }
    .header-stats { display: flex; gap: 24px; }
    .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: #555; }
    .stat-value { font-size: 15px; font-weight: 600; color: #fff; margin-top: 1px; }
    .reset-btn {
      background: none;
      border: 1px solid #2a2a2a;
      color: #666;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .reset-btn:hover { border-color: #444; color: #aaa; }

    /* ── Main ── */
    .main { max-width: 1200px; margin: 0 auto; padding: 28px 24px; }
    .section-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #444;
      font-weight: 600;
      margin-bottom: 12px;
    }

    /* ── Online users ── */
    .online-section { margin-bottom: 32px; }
    .online-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .online-chip {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 12px;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      font-size: 13px;
      color: #bbb;
      background: #161616;
    }
    .online-chip.me { color: #fff; }
    .online-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .chip-room { font-size: 11px; opacity: 0.75; }

    /* ── Rooms grid ── */
    .rooms-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(268px, 1fr));
      gap: 14px;
      margin-bottom: 36px;
    }

    .room-card {
      background: #161616;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 18px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s, opacity 0.2s;
    }
    .room-card.dimmed { opacity: 0.45; pointer-events: none; }
    .room-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: #222;
      transition: background 0.3s;
    }
    .room-card.up::before    { background: #c0392b; }
    .room-card.down::before  { background: #27ae60; }
    .room-card.mine          { border-color: var(--my-color, #444); }
    .room-card.mine::after {
      content: 'YOUR ROOM';
      position: absolute;
      top: 10px; right: 14px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.8px;
      color: var(--my-color, #888);
      opacity: 0.6;
    }
    .room-card.confirming-card {
      border-color: #3a3000;
      background: #141200;
    }

    .room-card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    .room-name { font-size: 14px; font-weight: 600; color: #ddd; line-height: 1.3; }
    .room-badge {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      padding: 2px 7px;
      border-radius: 4px;
      background: #222;
      color: #666;
      white-space: nowrap;
      margin-left: 8px;
      flex-shrink: 0;
    }
    .room-badge.double { background: #161e2e; color: #5580aa; }

    /* price */
    .price-main { font-size: 26px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
    .price-per  { font-size: 12px; color: #555; margin-top: 2px; }
    .price-delta { font-size: 12px; font-weight: 500; margin-top: 5px; }
    .price-delta.neutral { color: #444; }
    .price-delta.up      { color: #c0392b; }
    .price-delta.down    { color: #27ae60; }

    /* claimers */
    .claimers { margin: 12px 0 10px; min-height: 34px; }
    .claimer-row { display: flex; align-items: center; gap: 7px; margin-bottom: 4px; }
    .claimer-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .claimer-name { font-size: 13px; color: #bbb; }
    .claimer-name.me { color: #fff; font-weight: 600; }
    .claimer-via {
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 3px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .claimer-via.bid   { background: #1e1500; color: #806020; }
    .claimer-via.claim { background: #0e1e10; color: #3d7a4a; }
    .open-slot { font-size: 12px; color: #333; font-style: italic; }
    .unclaimed { font-size: 13px; color: #333; font-style: italic; }

    /* normal action buttons */
    .room-actions { display: flex; gap: 8px; }
    .btn-claim, .btn-bid, .btn-release {
      flex: 1;
      padding: 9px 8px;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn-claim {
      background: #0f2010;
      border: 1px solid #1e4020;
      color: #3d9e50;
    }
    .btn-claim:hover { background: #162a18; border-color: #2e6030; color: #5abf6d; }
    .btn-bid {
      background: #1e1500;
      border: 1px solid #3a2a00;
      color: #b08020;
    }
    .btn-bid:hover { background: #261c00; border-color: #4a3600; color: #d09830; }
    .btn-release {
      flex: 1;
      padding: 9px 8px;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
      background: #1a1010;
      border: 1px solid #2e1a1a;
      color: #885555;
    }
    .btn-release:hover { background: #221414; border-color: #3e2020; color: #aa6666; }

    .locked-msg {
      font-size: 12px;
      color: #3a2800;
      background: #1a1200;
      border: 1px solid #2e2000;
      border-radius: 7px;
      padding: 8px 10px;
      text-align: center;
      width: 100%;
    }

    /* ── Confirm UI ── */
    .confirm-box {
      background: #111000;
      border: 1px solid #3a3000;
      border-radius: 8px;
      padding: 14px;
      margin-top: 2px;
    }
    .confirm-price-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 4px;
    }
    .confirm-price {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }
    .confirm-price-label {
      font-size: 12px;
      color: #666;
    }
    .confirm-sub {
      font-size: 12px;
      color: #555;
      margin-bottom: 12px;
      line-height: 1.5;
    }
    .confirm-sub span { color: #888; }
    .confirm-btns { display: flex; gap: 8px; }
    .btn-confirm-claim, .btn-confirm-bid, .btn-cancel {
      flex: 1;
      padding: 10px 8px;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .btn-confirm-claim {
      background: #163020;
      border: 1px solid #2a6038;
      color: #4dbb66;
    }
    .btn-confirm-claim:hover { background: #1e4028; border-color: #3a8050; color: #6ddb86; }
    .btn-confirm-bid {
      background: #2a1e00;
      border: 1px solid #5a3a00;
      color: #d09830;
    }
    .btn-confirm-bid:hover { background: #362600; border-color: #6a4800; color: #e8b840; }
    .btn-cancel {
      background: #1e1e1e;
      border: 1px solid #333;
      color: #666;
    }
    .btn-cancel:hover { border-color: #555; color: #999; }

    /* ── History ── */
    .history-empty { font-size: 13px; color: #333; padding: 16px 0; }
    .history-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
      max-height: 300px;
      overflow-y: auto;
    }
    .history-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: #111;
      border-radius: 6px;
      font-size: 13px;
    }
    .history-item:first-child { background: #161616; }
    .h-user  { font-weight: 600; min-width: 80px; }
    .h-verb  { color: #444; font-size: 12px; min-width: 60px; }
    .h-verb[data-action="claim"]   { color: #3d7a4a; }
    .h-verb[data-action="release"] { color: #663333; }
    .h-verb[data-action="bid"]     { color: #7a6020; }
    .h-room  { color: #888; flex: 1; }
    .h-delta { color: #b08020; font-weight: 600; font-size: 12px; }
    .h-time  { color: #333; font-size: 11px; min-width: 55px; text-align: right; }

    @media (max-width: 600px) {
      header { padding: 12px 16px; }
      .main { padding: 20px 14px; }
      .header-stats { display: none; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const TOTAL_RENT = 15600;
    const BID_STEP = 25;
    const P = TOTAL_RENT / 14;
    const NUM_ROOMS = 9;

    const ROOM_DEFS = [
      { id: 'double', name: 'Downstairs Double',        slots: 2, isDouble: true,  initPrice: 2 * P },
      { id: 'first',  name: 'First Floor Room',          slots: 1, isDouble: false, initPrice: 1.5 * P },
      { id: 'sf1',    name: 'Second Floor Room 1',       slots: 1, isDouble: false, initPrice: 1.5 * P },
      { id: 'sf2',    name: 'Second Floor Room 2',       slots: 1, isDouble: false, initPrice: 1.5 * P },
      { id: 'sf3',    name: 'Second Floor Room 3',       slots: 1, isDouble: false, initPrice: 1.5 * P },
      { id: 'sf4',    name: 'Second Floor Room 4',       slots: 1, isDouble: false, initPrice: 1.5 * P },
      { id: 'sfb',    name: 'Second Floor Balcony Room', slots: 1, isDouble: false, initPrice: 1.5 * P },
      { id: 'adu1',   name: 'ADU 1',                     slots: 1, isDouble: false, initPrice: 1.5 * P },
      { id: 'adu2',   name: 'ADU 2',                     slots: 1, isDouble: false, initPrice: 1.5 * P },
    ];

    function genId() {
      return Math.random().toString(36).slice(2) + Date.now().toString(36);
    }

    function fmt(n) {
      return '$' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    }

    function timeSince(ts) {
      const s = Math.floor((Date.now() - ts) / 1000);
      if (s < 60) return `${s}s ago`;
      if (s < 3600) return `${Math.floor(s / 60)}m ago`;
      return `${Math.floor(s / 3600)}h ago`;
    }

    function JoinScreen({ onJoin }) {
      const [name, setName] = useState('');
      const submit = () => { const t = name.trim(); if (t) onJoin(t); };
      return (
        <div className="join-screen">
          <div className="join-card">
            <h1>Rent Bidder</h1>
            <p className="join-subtitle">Enter your name to join the room assignment</p>
            <input
              className="join-input"
              placeholder="Your name"
              value={name}
              autoFocus
              onChange={e => setName(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && submit()}
            />
            <button className="join-btn" onClick={submit} disabled={!name.trim()}>
              Join
            </button>
          </div>
        </div>
      );
    }

    function App() {
      const [myId] = useState(() => {
        let id = localStorage.getItem('rb_uid');
        if (!id) { id = genId(); localStorage.setItem('rb_uid', id); }
        return id;
      });
      const [myName, setMyName] = useState(() => localStorage.getItem('rb_name') || '');
      const [joined, setJoined] = useState(() => !!localStorage.getItem('rb_name'));
      const [myColor, setMyColor] = useState('#888');
      const [connected, setConnected] = useState(false);
      const [serverState, setServerState] = useState(null);
      const [confirming, setConfirming] = useState(null); // { roomId, action: 'claim'|'bid' }
      const [now, setNow] = useState(Date.now());
      const wsRef = useRef(null);
      const nameRef = useRef(myName);

      useEffect(() => { nameRef.current = myName; }, [myName]);
      useEffect(() => {
        const id = setInterval(() => setNow(Date.now()), 15000);
        return () => clearInterval(id);
      }, []);

      useEffect(() => {
        if (!joined || !myName) return;
        let dead = false;
        function connect() {
          if (dead) return;
          const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
          const socket = new WebSocket(`${proto}//${location.host}`);
          wsRef.current = socket;
          socket.onopen = () => {
            setConnected(true);
            socket.send(JSON.stringify({ type: 'join', userId: myId, name: nameRef.current }));
          };
          socket.onmessage = e => {
            const msg = JSON.parse(e.data);
            if (msg.type === 'welcome') { setMyColor(msg.color); setServerState(msg.state); }
            else if (msg.type === 'state') { setServerState(msg.state); }
          };
          socket.onclose = () => { setConnected(false); if (!dead) setTimeout(connect, 2000); };
          socket.onerror = () => {};
        }
        connect();
        return () => { dead = true; wsRef.current?.close(); };
      }, [joined, myId, myName]);

      const send = useCallback(msg => {
        const ws = wsRef.current;
        if (ws && ws.readyState === 1) ws.send(JSON.stringify({ ...msg, userId: myId }));
      }, [myId]);

      const handleJoin = name => {
        localStorage.setItem('rb_name', name);
        setMyName(name);
        setJoined(true);
      };

      const leave = () => {
        localStorage.removeItem('rb_name');
        wsRef.current?.close();
        setJoined(false);
        setMyName('');
        setServerState(null);
        setConfirming(null);
      };

      if (!joined) return <JoinScreen onJoin={handleJoin} />;
      if (!serverState) return <div className="loading">Connecting to server…</div>;

      const { prices, claims, history, users } = serverState;

      // My current room and how I got there
      let myRoom = null;
      let myEntry = null;
      for (const room of ROOM_DEFS) {
        const entry = (claims[room.id] || []).find(c => c.userId === myId);
        if (entry) { myRoom = room; myEntry = entry; break; }
      }
      const isLocked = myEntry?.via === 'bid';

      const totalClaimed = Object.values(claims).reduce((s, c) => s + c.length, 0);

      const doAction = (roomId, action) => {
        send({ type: action, roomId });
        setConfirming(null);
      };

      return (
        <div>
          <header>
            <h1>Rent Bidder</h1>
            <div className="header-right">
              {!connected && <span className="disconnected-pill">Reconnecting…</span>}
              {isLocked && (
                <span className="locked-pill">
                  Locked in · {myRoom?.name}
                </span>
              )}
              <div
                className="my-identity"
                style={{ borderColor: myColor + '50' }}
                title="Click to leave"
                onClick={leave}
              >
                <span className="identity-dot" style={{ background: myColor }} />
                <span style={{ color: '#ddd' }}>{myName}</span>
                {myRoom && <span className="my-room-tag">{myRoom.name}</span>}
              </div>
              <div className="header-stats">
                <div>
                  <div className="stat-label">Total Rent</div>
                  <div className="stat-value">{fmt(TOTAL_RENT)}</div>
                </div>
                <div>
                  <div className="stat-label">Assigned</div>
                  <div className="stat-value">{totalClaimed}/10</div>
                </div>
              </div>
              <button className="reset-btn" onClick={() => { if (confirm('Reset all bids and claims?')) send({ type: 'reset' }); }}>
                Reset
              </button>
            </div>
          </header>

          <div className="main">
            {/* Online users */}
            <div className="online-section">
              <div className="section-label">In Session</div>
              <div className="online-list">
                {Object.values(users).map(u => {
                  const inRoom = ROOM_DEFS.find(r => (claims[r.id] || []).some(c => c.userId === u.id));
                  const entry = inRoom ? (claims[inRoom.id] || []).find(c => c.userId === u.id) : null;
                  const locked = entry?.via === 'bid';
                  return (
                    <div key={u.id} className={`online-chip${u.id === myId ? ' me' : ''}`} style={{ borderColor: u.color + '40' }}>
                      <span className="online-dot" style={{ background: u.color }} />
                      <span>{u.name}{u.id === myId ? ' (you)' : ''}</span>
                      {inRoom && (
                        <span className="chip-room" style={{ color: u.color }}>
                          · {inRoom.name}{locked ? ' 🔒' : ''}
                        </span>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Rooms */}
            <div className="section-label">Rooms</div>
            <div className="rooms-grid">
              {ROOM_DEFS.map(room => {
                const price = prices[room.id] ?? room.initPrice;
                const delta = price - room.initPrice;
                const direction = Math.abs(delta) < 0.01 ? 'neutral' : delta > 0 ? 'up' : 'down';
                const roomClaims = claims[room.id] || [];
                const iAmIn = roomClaims.some(c => c.userId === myId);
                const openSlots = room.slots - roomClaims.length;
                const isFull = openSlots <= 0;
                const isConfirming = confirming?.roomId === room.id;
                // Dim cards when another card is in confirm state
                const isDimmed = confirming && !isConfirming && !iAmIn;

                // Per-person price for the double room after a bid
                const bidPrice = price + BID_STEP;
                const perPersonAfterBid = room.isDouble ? bidPrice / 2 : bidPrice;

                return (
                  <div
                    key={room.id}
                    className={[
                      'room-card',
                      direction,
                      iAmIn ? 'mine' : '',
                      isDimmed ? 'dimmed' : '',
                      isConfirming ? 'confirming-card' : '',
                    ].filter(Boolean).join(' ')}
                    style={iAmIn ? { '--my-color': myColor } : {}}
                  >
                    <div className="room-card-top">
                      <div className="room-name">{room.name}</div>
                      <div className={`room-badge${room.isDouble ? ' double' : ''}`}>
                        {room.isDouble ? '2 people' : '1 person'}
                      </div>
                    </div>

                    <div className="price-main">{fmt(price)}</div>
                    {room.isDouble && <div className="price-per">{fmt(price / 2)}/person</div>}
                    <div className={`price-delta ${direction}`}>
                      {direction === 'neutral' && 'Starting price'}
                      {direction === 'up' && `↑ ${fmt(Math.abs(delta))} above start`}
                      {direction === 'down' && `↓ ${fmt(Math.abs(delta))} below start`}
                    </div>

                    {/* Claimers */}
                    <div className="claimers">
                      {roomClaims.length === 0
                        ? <div className="unclaimed">Unclaimed</div>
                        : roomClaims.map(c => (
                          <div key={c.userId} className="claimer-row">
                            <span className="claimer-dot" style={{ background: c.color }} />
                            <span className={`claimer-name${c.userId === myId ? ' me' : ''}`}>
                              {c.name}{c.userId === myId ? ' (you)' : ''}
                            </span>
                            <span className={`claimer-via ${c.via}`}>{c.via}</span>
                          </div>
                        ))
                      }
                      {room.slots > 1 && openSlots > 0 && roomClaims.length > 0 && (
                        <div className="open-slot">{openSlots} spot open</div>
                      )}
                    </div>

                    {/* Actions / Confirm UI */}
                    {isConfirming ? (
                      <div className="confirm-box">
                        {confirming.action === 'claim' ? (
                          <>
                            <div className="confirm-price-row">
                              <span className="confirm-price">{fmt(price)}</span>
                              <span className="confirm-price-label">
                                {room.isDouble ? `(${fmt(price / 2)}/person)` : '/month'}
                              </span>
                            </div>
                            <div className="confirm-sub">
                              Claim at current price — no change to other rooms.
                            </div>
                            <div className="confirm-btns">
                              <button className="btn-confirm-claim" onClick={() => doAction(room.id, 'claim')}>
                                Confirm Claim
                              </button>
                              <button className="btn-cancel" onClick={() => setConfirming(null)}>Cancel</button>
                            </div>
                          </>
                        ) : (
                          <>
                            <div className="confirm-price-row">
                              <span className="confirm-price">{fmt(bidPrice)}</span>
                              <span className="confirm-price-label">
                                {room.isDouble ? `(${fmt(perPersonAfterBid)}/person)` : `+$${BID_STEP}`}
                              </span>
                            </div>
                            <div className="confirm-sub">
                              <span>+${BID_STEP} on this room</span> · other rooms each drop{' '}
                              <span>{fmt(BID_STEP / (NUM_ROOMS - 1))}</span>
                              {isFull && roomClaims[0] && (
                                <><br />Evicts <span>{roomClaims[0].name}</span></>
                              )}
                            </div>
                            <div className="confirm-btns">
                              <button className="btn-confirm-bid" onClick={() => doAction(room.id, 'bid')}>
                                {isFull ? 'Confirm Outbid' : 'Confirm Bid'}
                              </button>
                              <button className="btn-cancel" onClick={() => setConfirming(null)}>Cancel</button>
                            </div>
                          </>
                        )}
                      </div>
                    ) : (
                      <div className="room-actions">
                        {iAmIn && myEntry?.via === 'claim' ? (
                          <button className="btn-release" onClick={() => doAction(room.id, 'release')}>
                            Release Claim
                          </button>
                        ) : isLocked ? (
                          <div className="locked-msg">
                            You're locked in to {myRoom?.name}
                          </div>
                        ) : (
                          <>
                            {openSlots > 0 && (
                              <button className="btn-claim" onClick={() => setConfirming({ roomId: room.id, action: 'claim' })}>
                                Claim
                              </button>
                            )}
                            <button className="btn-bid" onClick={() => setConfirming({ roomId: room.id, action: 'bid' })}>
                              {isFull ? `Outbid` : `Bid`}
                            </button>
                          </>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            {/* History */}
            <div className="section-label">History</div>
            {history.length === 0
              ? <div className="history-empty">No actions yet.</div>
              : (
                <div className="history-list">
                  {history.map((h, i) => {
                    const room = ROOM_DEFS.find(r => r.id === h.roomId);
                    const u = users[h.userId];
                    return (
                      <div key={i} className="history-item">
                        <span className="h-user" style={{ color: u?.color || '#888' }}>{h.name}</span>
                        <span className="h-verb" data-action={h.action}>
                          {h.action === 'claim' ? 'claimed' : h.action === 'release' ? 'released' : 'outbid'}
                        </span>
                        <span className="h-room">{room?.name}</span>
                        {h.action === 'bid' && <span className="h-delta">+${BID_STEP}</span>}
                        <span className="h-time">{timeSince(h.ts)}</span>
                      </div>
                    );
                  })}
                </div>
              )
            }
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
